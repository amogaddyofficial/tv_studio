<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Studio - Director</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/bundle.min.js"></script>
    <script>
        window.SUPABASE_URL = 'https://fwompafuvvyvtvsknzqk.supabase.co';
        window.SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3b21wYWZ1dnZ5dnR2c2tuenFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjE2MjAsImV4cCI6MjA5MjUzNzYyMH0.hKJFX1lVSRg8_HTxxyBcjAQlaWi4VMImPZBn5lEHaMk';
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <!-- Login Overlay -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-box glass">
            <h2>Accesso Riservato</h2>
            <p>Accedi con un account autorizzato per gestire la Live.</p>
            <div id="g_id_onload"
                data-client_id="976079938156-c447fckmensdqq7ujm7qjm09b41pcqmk.apps.googleusercontent.com"
                data-context="signin"
                data-ux_mode="popup"
                data-callback="handleCredentialResponse"
                data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                data-type="standard"
                data-shape="rectangular"
                data-theme="filled_black"
                data-text="signin_with"
                data-size="large"
                data-logo_alignment="left">
            </div>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <div id="app-content" style="display: none; height: 100vh; flex-direction: column;">
        <header>
            <div class="logo">Canale 100 Studio</div>
            <div class="stats glass">
                <div class="pulse"></div>
                <span id="viewer-count">0</span> Viewers
            </div>
        </header>

        <main>
            <div class="sources-panel glass">
                <h3>Sorgenti</h3>
                
                <div class="source-item">
                    <label>Camera</label>
                    <button id="btn-camera" class="secondary">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        Attiva Camera
                    </button>
                </div>

                <div class="source-item">
                    <label>Schermo</label>
                    <button id="btn-screen" class="secondary">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        Condividi Schermo
                    </button>
                    <div id="screen-status" style="font-size:0.7rem; color:var(--text-muted); margin-top:5px; display:none;">Schermo attivo</div>
                </div>

                <div class="source-item">
                    <label>Mixer Regia</label>
                    <div class="mixer-buttons">
                        <button id="layout-cam" class="mixer-btn active">🎥 Camera</button>
                        <button id="layout-screen" class="mixer-btn">🖥️ Schermo</button>
                        <button id="layout-pip" class="mixer-btn">🖼️ PiP</button>
                        <button id="layout-split" class="mixer-btn">🎛️ Split</button>
                    </div>
                </div>

                <div class="source-item">
                    <label>🎬 Media, Sigle e Playlist</label>
                    <input type="file" id="media-upload" accept="video/*,image/*" multiple style="font-size:0.8rem; width:100%; margin-top:5px;" />
                    <ul id="media-playlist-ui" style="list-style:none; padding:5px 0; margin:0; font-size:0.75rem; color:var(--text-muted); max-height: 80px; overflow-y: auto;"></ul>
                    <video id="media-preview" controls style="width:100%; border-radius:6px; display:none; margin-top:5px;"></video>
                    <button id="layout-media" class="mixer-btn" style="margin-top:5px; display:none; width: 100%;">Manda in Onda Playlist</button>
                </div>

                <div class="source-item">
                    <label>📅 Palinsesto (Programmazione Automatica)</label>
                    <div style="display:flex; gap:5px; margin-bottom:5px; flex-wrap:wrap;">
                        <input type="time" id="prog-time" style="padding:5px; background:rgba(0,0,0,0.5); color:white; border:1px solid rgba(255,255,255,0.2); border-radius:4px; flex:1;" required>
                        <input type="text" id="prog-name" placeholder="Nome Programma" style="flex:2; padding:5px; background:rgba(0,0,0,0.5); color:white; border:1px solid rgba(255,255,255,0.2); border-radius:4px;" required>
                        <input type="file" id="prog-file-upload" accept="video/*,audio/*" style="width:100%; padding:5px; background:rgba(0,0,0,0.5); color:white; border:1px solid rgba(255,255,255,0.2); border-radius:4px;">
                        <input type="text" id="prog-url" placeholder="Oppure inserisci un URL MP4 o YouTube" style="width:100%; padding:5px; background:rgba(0,0,0,0.5); color:white; border:1px solid rgba(255,255,255,0.2); border-radius:4px;">
                        <button id="btn-add-prog" class="primary" style="width:100%; justify-content:center; padding:5px;">Aggiungi al Palinsesto</button>
                    </div>
                    <ul id="schedule-list" style="list-style:none; max-height:120px; overflow-y:auto; font-size:0.85rem; border:1px solid rgba(255,255,255,0.1); border-radius:4px; padding:5px; background:rgba(0,0,0,0.2);">
                        <!-- Schedule items go here -->
                    </ul>
                    <button id="btn-sync-schedule" class="secondary" style="width:100%; justify-content:center; font-size:0.8rem; margin-top:5px; padding:6px;">Sincronizza agli Spettatori</button>
                </div>

                <div class="source-item">
                    <label>📊 Statistiche Settimanali (Picco Spettatori)</label>
                    <div id="stats-chart" style="display:flex; align-items:flex-end; gap:5px; height:80px; margin-top:10px; padding:5px; border-bottom:1px solid rgba(255,255,255,0.2); border-left:1px solid rgba(255,255,255,0.2);">
                        <!-- Bars go here -->
                    </div>
                    <div id="stats-labels" style="display:flex; justify-content:space-between; font-size:0.6rem; color:var(--text-muted); margin-top:2px;"></div>
                </div>
            </div>

            <div class="studio-container">
                <div class="preview-area glass">
                    <canvas id="studio-canvas" width="1280" height="720"></canvas>
                </div>

                <div class="controls glass">
                    <button id="btn-broadcast" class="primary">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.521 14.276A8.001 8.001 0 0012 18c3.08 0 5.823-1.121 7.973-3.03M7.054 11.232A5.996 5.996 0 0012 14c1.884 0 3.568-.691 4.946-1.768M9 8.5A3 3 0 0012 10a3 3 0 003-1.5M12 5v.01"></path></svg>
                        Vai in Onda
                    </button>
                    <button id="btn-stop" class="danger hidden">
                        Interrompi Trasmissione
                    </button>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Hidden video elements for source capture -->
    <video id="cam-video" autoplay playsinline muted style="position:fixed; top:-9999px; left:-9999px;"></video>
    <video id="screen-video" autoplay playsinline muted style="position:fixed; top:-9999px; left:-9999px;"></video>

    <script src="supabase-client.js"></script>
    <script type="module" src="studio.js"></script>
</body>
</html>

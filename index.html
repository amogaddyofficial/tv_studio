<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Viewer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <header>
        <div class="logo">Canale 100 Live</div>
        <div class="stats glass">
            <div class="pulse"></div>
            <span id="viewer-count">0</span> Viewers
        </div>
    </header>

    <main style="justify-content: center;">
        <div class="viewer-container">
            <div class="video-container glass">
                <video id="viewer-video" autoplay playsinline></video>
                <div id="offline-overlay" class="offline-message">
                    <h2>Stream Offline</h2>
                    <p>La trasmissione non è ancora iniziata.</p>
                    <div style="margin-top: 20px; display: flex; gap: 10px; align-items: center;">
                        <button id="btn-reconnect" class="primary">Riprova a Connetterti</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="viewer.js"></script>
</body>
</html>

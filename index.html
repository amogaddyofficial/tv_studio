<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Viewer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <header>
        <div class="logo">Canale 100 Live</div>
        <div class="stats glass">
            <div class="pulse"></div>
            <span id="viewer-count">0</span> Viewers
        </div>
    </header>

    <main style="justify-content: center; gap: 20px;">
        <div class="viewer-container" style="flex: 3;">
            <div class="video-container glass" style="position:relative;">
                <button id="btn-fullscreen" style="position:absolute; top:10px; right:10px; z-index:20; background:rgba(0,0,0,0.5); border:none; color:white; padding:8px; border-radius:4px; cursor:pointer;" title="Pieno Schermo">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>
                <video id="viewer-video" autoplay playsinline></video>
                <div id="offline-overlay" class="offline-message">
                    <h2 id="offline-title">Stream Offline</h2>
                    <p id="offline-desc">La trasmissione non è ancora iniziata.</p>
                    <div id="yt-container" style="display:none; width:100%; aspect-ratio:16/9; margin-top:15px; pointer-events:none;">
                        <iframe id="yt-iframe" width="100%" height="100%" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        <p style="font-size:0.75rem; color:var(--text-muted); margin-top:5px;">In onda ora (Auto-TV)</p>
                    </div>
                    <div id="reconnect-box" style="margin-top: 20px; display: flex; gap: 10px; align-items: center; justify-content:center;">
                        <button id="btn-reconnect" class="primary">Riprova a Connetterti al Live</button>
                    </div>
                </div>
                <div id="tv-timeline" style="position:absolute; bottom:0; left:0; right:0; height:6px; background:rgba(0,0,0,0.5); display:none; z-index:10;">
                    <div id="tv-progress" style="height:100%; background:var(--primary-color); width:0%; transition: width 1s linear;"></div>
                </div>
            </div>
        </div>
        
        <div class="schedule-sidebar glass" style="flex: 1; max-width: 350px; padding: 20px; display: flex; flex-direction: column;">
            <h3 style="margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">📺 Palinsesto</h3>
            <ul id="viewer-schedule" style="list-style:none; flex: 1; overflow-y:auto; font-size:0.9rem;">
                <li style="color:var(--text-muted); text-align:center; padding: 20px 0;">In attesa della programmazione...</li>
            </ul>
        </div>
    </main>

    <script src="viewer.js"></script>
</body>
</html>

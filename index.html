<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Viewer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <header>
        <div class="logo">LiveStream</div>
        <div class="stats glass">
            <div class="pulse"></div>
            <span id="viewer-count">0</span> Viewers
        </div>
    </header>

    <main style="justify-content: center;">
        <div class="viewer-container">
            <div class="video-container glass">
                <video id="viewer-video" autoplay playsinline></video>
                <div id="offline-overlay" class="offline-message">
                    <h2>Stream is Offline</h2>
                    <p>Waiting for the broadcast to start...</p>
                    
                    <div style="margin-top: 20px; display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="join-id" placeholder="Enter Studio ID" style="padding: 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white;">
                        <button id="btn-join" class="primary">Connect</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="viewer.js"></script>
</body>
</html>
